  - docs/designs/openharness-skill-system-refactor/STATUS.yaml
  - docs/designs/openharness-skill-system-refactor/01-requirements.md
  - docs/designs/openharness-skill-system-refactor/02-overview-design.md
  - docs/designs/openharness-skill-system-refactor/03-detailed-design.md
  - docs/designs/openharness-skill-system-refactor/04-implementation-plan.md
done_criteria:
  - AGENTS.md is treated as a repo-local map, while the reusable harness protocol lives in OpenHarness skills and CLI contracts.
  - using-openharness becomes an entry skill that routes into workflow skills and completion gates instead of re-describing the whole repository workflow as a self-referential checklist.
  - OpenHarness distinguishes harness-native workflow skills from reusable general-purpose skills that can be routed in without becoming part of the harness protocol.
  - Completion claims require verification, evidence, and status updates, and checker support exists to fail incomplete completion attempts.
  - External research is allowed, but it must be written back into a design package or .project-memory/ before it counts as accepted task truth.
verification:
