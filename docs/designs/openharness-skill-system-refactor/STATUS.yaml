id: OR-019
title: OpenHarness Skill System Refactor
status: detailed_ready
summary: Refactor OpenHarness into a protocol-first, skill-driven harness with workflow routing, completion gates, and research intake rules.
owner: codex
created_at: 2026-03-19
updated_at: 2026-03-19
depends_on: []
scope:
  areas:
    - harness
    - skills
    - repo-protocol
    - verification
