id: OR-016
title: Harness Completion And Design Migration
status: archived
summary: Historical record of the completed harness migration that moved design packages
  under docs, archived legacy design notes, and strengthened enforcement.
owner: codex
created_at: 2026-03-19
updated_at: 2026-03-19
depends_on:
- OR-015
scope:
  areas:
  - harness
  - docs
  - repo-protocol
  - task-migration
entrypoints:
- docs/archived/designs/harness-completion/README.md
- docs/archived/designs/harness-completion/STATUS.yaml
- docs/archived/designs/harness-completion/01-requirements.md
- docs/archived/designs/harness-completion/02-overview-design.md
- docs/archived/designs/harness-completion/03-detailed-design.md
- docs/archived/designs/harness-completion/04-implementation-plan.md
done_criteria:
- The harness design-package root is moved from `designs/` to `docs/designs/`, and
  repository entrypoints point to the new location consistently.
- Legacy standalone design notes are archived under `docs/archived/legacy/`, and current
  task facts live under `docs/designs/`.
- Historical active-task descriptions are absorbed into formal design packages or
  explicitly tracked by a follow-up package.
- Harness validation detects more than file presence, including status-flow validation
  and referenced-path validation.
- Repository docs define a single default workflow centered on design packages rather
  than task-board or standalone design files.
- Follow-up protocol for replay/artifact/task-env integration is documented, even
  if the full runtime is deferred.
verification:
  required_commands:
  - uv run python .codex/skills/openharness/scripts/openharness.py check-designs
  - uv run python .codex/skills/openharness/scripts/openharness.py bootstrap --all
  - uv run pytest .codex/skills/openharness/tests/test_openharness.py
  required_scenarios:
  - docs_design_root_migration_plan
  - legacy_design_asset_migration_plan
  - harness_enforcement_gap_review
