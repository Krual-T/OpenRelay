done_criteria:
  - 建立高频用户功能清单，至少覆盖命令入口、卡片入口、普通消息执行、流式回复和停止/恢复类控制。
  - 每个清单项都拆成用户可见 UI、实际副作用、状态持久化、可观测证据和验证方式。
  - 明确飞书官方 CLI 或官方调试工具能否用于真实 UI / 消息 / 卡片流式验证，并记录证据、限制和替代路径。
  - 给出至少一条可执行的真实飞书验收流程，支持用户触发消息后由本地 trace 或运行记录判断结果。
