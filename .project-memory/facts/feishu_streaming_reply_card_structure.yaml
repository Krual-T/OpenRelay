statement: 当前飞书流式回复卡片在 streaming 阶段使用固定 card shell：schema 2.0、streaming_mode=true、summary=Executing、body
  内含一个 streaming markdown element 和一个 loading icon element。运行中真正按增量更新的是 streaming_content
  这个 markdown 元素的 content。该 content 由过程区和正文区拼接：过程区来自 history_items/worked_for 等状态渲染，正文区来自
  partial_text 的 assistant 输出，位于 --- 分隔线之后，承担主要打字机效果。final 阶段则整体替换为 complete card，包含可折叠的
  Execution Log panel 和最终答案 markdown。
