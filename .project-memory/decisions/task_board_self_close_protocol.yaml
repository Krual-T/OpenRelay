id: task_board_self_close_protocol
kind: decision
title: 设计任务通过仓库内任务板与关闭条件由 Codex 自行勾选
summary: 采用仓库内 Markdown 任务板、稳定任务 ID、关闭条件和证据回写，让 Codex CLI 在完成任务时能自己安全地更新状态。
scope:
  repo: openrelay
  branch: main
status: proposed
created_at: '2026-03-10T10:10:00Z'
updated_at: '2026-03-16T00:00:00Z'
confidence: 0.88
review_after: '2026-06-30'
intent_aliases:
- open questions 怎么改成任务板
- TaskBoard 在哪里
- codex cli 怎么自己勾选任务
- 设计任务为什么要有关闭条件和证据
- task board protocol 是什么
tags:
- decision
- task-board
- docs
- workflow
alternatives:
- 继续维护自由文本 Open Questions 列表，由人手工判断是否完成。
- 依赖外部任务系统维护状态，再由仓库文档事后同步。
- 任务完成后只改代码，不回写任务状态和证据。
consequences:
- Codex CLI 可以在同一轮 patch 中同时更新代码和任务状态，减少状态漂移。
- 任务板会更结构化，但每个任务都需要维护关闭条件和证据。
- 后续如需自动校验，可以在现有结构上补脚本，而不必推翻文档。
revisit_when:
- 当任务板开始被频繁使用且需要 CI 级一致性校验时重新评估是否增加脚本检查。
- 当仓库引入外部正式任务系统时重新评估双写是否值得保留。
question: openrelay 的设计任务应该如何组织，才能让 Codex CLI 完成后自己稳定地勾选？
decision: 把设计任务收敛到仓库内 Markdown 任务板，并用稳定任务 ID、关闭条件和证据回写管理状态；当前主任务板文件是 docs/design/TaskBoard.md，协议说明保留在 docs/design/task-board-protocol.md。Codex 只有在同一轮改动里同时满足关闭条件并回写证据时，才能把主复选框改成已完成。
rationale: Codex CLI 天然适合同步修改仓库内多个文件，但不适合依赖外部系统状态；把任务状态、关闭条件和证据都收敛到仓库内，既能让任务关闭动作可追溯，也能避免“代码完成了但任务板没更新”或“任务板勾了但没有证据”的漂移。
evidence:
